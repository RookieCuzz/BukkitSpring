settings:
  enabled: true
  debug: false
  mmocore:
    enabled: true
  consumables:
    disable-clicks-on-blocks: false
  command-whitelist:
    enabled: true
    labels:
      - tell
      - msg
      - say
      - title
      - playsound
      - effect
      - give
      - xp
      - experience
      - clear
      - item
      - particle

# Consumable definition files are loaded from:
# plugins/ConsumableSkillBridge/items/consumable/*.yml
#
# Standard file schema (recommended):
# schema-version: 2
# defaults:
#   trigger: RIGHT_CLICK
#   consume: DEFAULT
#   max-consume: 1
#   cooldown: 0
# consumables:
#   FIREBALL_SCROLL:
#     display:
#       material: PAPER
#       name: "&cFireball Scroll"
#     skill:
#       id: FIREBOLT
#       parameters:
#         damage: 8
#         radius: 3
#
# Legacy compatibility (optional):
# mappings:
#   FIREBALL_SCROLL: FIREBOLT
#   HEALING_SOUP:
#     skill: HEAL
#     trigger: EAT
#     max-consume: 3
#     cooldown: 2
