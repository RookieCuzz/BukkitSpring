schema-version: 2

defaults:
  trigger: RIGHT_CLICK
  consume: DEFAULT
  max-consume: 1
  cooldown: 0
  restore-health: 0
  restore-food: 0
  restore-saturation: 0
  restore-mana: 0
  restore-stamina: 0
  requirements:
    permission: ""
    min-level: 0
    min-food: 0
    min-mana: 0
    min-stamina: 0
  mana-cost: 0
  stamina-cost: 0

consumables:
  FIREBALL_SCROLL:
    display:
      material: PAPER
      name: "&cFireball Scroll"
      lore:
        - "&7Cast a fire skill on right click."
        - "&7Uses: &e{uses_left}&7/&e{max_consume}"
        - "&7Generated by ConsumableSkillBridge."
    skill:
      id: FIREBOLT
    requirements:
      min-mana: 10
    mana-cost: 6
    vanilla-eating: false
    disable-right-click-consume: false
    cooldown: 5
    cooldown-key: consumable:fireball_scroll
    effects:
      speed_buff:
        type: SPEED
        duration: 3
        amplifier: 0
        particles: true
    commands:
      note:
        format: "tell %player_name% You used FIREBALL_SCROLL"
        console: true
        op: false
        chance: 1.0
        delay-ticks: 0
    sounds:
      on-consume:
        cast:
          sound: ENTITY_ENDERMAN_TELEPORT
          volume: 1.0
          pitch: 1.2

  HEALING_SOUP:
    display:
      material: MUSHROOM_STEW
      name: "&aHealing Soup"
      lore:
        - "&7Trigger by eating."
        - "&7Has three uses."
        - "&7Uses left: &e{uses_left}"
    trigger: EAT
    vanilla-eating: true
    max-consume: 3
    cooldown: 2
    restore-health: 2
    restore-food: 4
    restore-saturation: 1.5
    effects:
      heal_regen:
        type: REGENERATION
        duration: 5
        amplifier: 1
    sounds:
      on-consume:
        sound: ENTITY_GENERIC_DRINK
        volume: 1.0
        pitch: 1.0

  IDENTIFY_SCROLL:
    display:
      material: PAPER
      name: "&bIdentify Scroll"
      lore:
        - "&7Use on target item in inventory."
        - "&7Consumes on success."
    trigger: ON_ITEM
    use-on-item:
      enabled: true
      player-inventory-only: true
      allow-target-materials:
        - DIAMOND_SWORD
        - NETHERITE_SWORD
    cooldown: 0
    commands:
      tell:
        format: "tell %player_name% Applied IDENTIFY_SCROLL on %player_name%'s item."
        console: true

  CURSED_POTION:
    display:
      material: POTION
      name: "&4Cursed Potion"
      lore:
        - "&7This item cannot be consumed directly."
        - "&7inedible: true"
    trigger: EAT
    inedible: true
    skill:
      id: ""

  MANA_TONIC:
    display:
      material: POTION
      name: "&9Mana Tonic"
      lore:
        - "&7Restore mana/stamina via MMOCore (optional)."
        - "&7Mana +20, Stamina +12"
    trigger: EAT
    vanilla-eating: true
    requirements:
      min-mana: 0
      min-stamina: 0
    restore-mana: 20
    restore-stamina: 12
