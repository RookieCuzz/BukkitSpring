schema-version: 2

defaults:
  trigger: RIGHT_CLICK
  consume: DEFAULT
  max-consume: 3
  cooldown: 6
  vanilla-eating: false
  disable-right-click-consume: false
  sounds:
    on-consume:
      cast:
        sound: ENTITY_ILLUSIONER_CAST_SPELL
        volume: 1.0
        pitch: 1.0

consumables:
  ILLUSIONIST_CARD_THROW_STONE:
    display:
      material: COAL
      craftengine-id: illusionist:icon_card_throw
      name: "&bIllusionist - Card Throw Stone"
      lore:
        - "&8◆ &7Trigger: &fRight Click"
        - "&8◆ &7Skill: &eCARD_THROW"
        - "&8◆ &7Uses: &b{uses_left}&7/&b{max_consume}"
        - "&8◆ &7Cooldown: &6{cooldown_seconds}s"
    skill:
      id: CARD_THROW
    cooldown: 2
    cooldown-key: illusionist:card_throw

  ILLUSIONIST_PHANTOM_BLINK_STONE:
    display:
      material: COAL
      craftengine-id: illusionist:icon_phantom_blink
      name: "&dIllusionist - Phantom Blink Stone"
      lore:
        - "&8◆ &7Trigger: &fShift + Right Click"
        - "&8◆ &7Skill: &ePHANTOM_BLINK"
        - "&8◆ &7Uses: &b{uses_left}&7/&b{max_consume}"
        - "&8◆ &7Cooldown: &6{cooldown_seconds}s"
