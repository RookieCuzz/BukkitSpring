schema-version: 2

defaults:
  trigger: RIGHT_CLICK
  consume: DEFAULT
  max-consume: 3
  cooldown: 6
  vanilla-eating: false
  disable-right-click-consume: false
  sounds:
    on-consume:
      cast:
        sound: ENTITY_ILLUSIONER_CAST_SPELL
        volume: 1.0
        pitch: 1.0

consumables:
  MARTIAL_ARTIST_DOUBLE_STRIKE_STONE:
