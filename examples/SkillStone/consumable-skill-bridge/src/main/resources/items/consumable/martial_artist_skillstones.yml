      material: COAL
      craftengine-id: martial_artist:icon_double_strike
      name: "&6Martial Artist - Double Strike Stone"
      lore:
        - "&8◆ &7Trigger: &fRight Click"
        - "&8◆ &7Skill: &eDOUBLE_STRIKE"
        - "&8◆ &7Uses: &b{uses_left}&7/&b{max_consume}"
        - "&8◆ &7Cooldown: &6{cooldown_seconds}s"
    skill:
      id: DOUBLE_STRIKE
    cooldown: 1
    cooldown-key: martial_artist:double_strike

  MARTIAL_ARTIST_AGILE_STRIKE_STONE:
