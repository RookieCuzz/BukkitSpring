kafka:
  enabled: false
  bootstrap-servers: "localhost:9092"
  client-id: "bukkitspring"
  virtual-threads: true
  properties: {}
  producer: {}
  consumer: {}
  consumer-manager:
    shutdown-timeout: 30
    error-handling: "SKIP"
    enable-consume-logging: false
  admin: {}

rocketmq:
  enabled: false
  namesrv-addr: "127.0.0.1:9876"
  namespace: ""
  instance-name: "bukkitspring"
  access-channel: "LOCAL"
  use-tls: false
  vip-channel-enabled: false
  virtual-threads: true
  producer:
    group: "bukkitspring-producer"
    send-timeout-ms: 3000
    retry-times-when-send-failed: 2
    retry-times-when-send-async-failed: 2
  consumer:
    group: "bukkitspring-consumer"
    consume-from-where: "CONSUME_FROM_LAST_OFFSET"
    message-model: "CLUSTERING"
    consume-thread-min: 20
    consume-thread-max: 64
    max-reconsume-times: 16
    consume-timestamp: ""

time:
  enabled: false
  virtual-threads: true
  zone-id: "Asia/Shanghai"
  debug-offset-minutes: 0
  system-time:
    allow-set: false
    command-timeout-ms: 5000
    prefer-timedatectl: true

redis:
  enabled: false
  host: "localhost"
  port: 6379
  database: 0

caffeine:
  enabled: false
  virtual-threads: true
  default-cache-name: "default"
  default:
    initial-capacity: 64
    maximum-size: 10000
    expire-after-write-ms: 0
    expire-after-access-ms: 0
    refresh-after-write-ms: 0
    weak-keys: false
    weak-values: false
    soft-values: false
    record-stats: false
  caches: {}

mybatis:
  enabled: false
  auto-commit: true
  jdbc-url: ""
  username: ""
  password: ""
  driver: "com.mysql.cj.jdbc.Driver"
  log-impl: "STDOUT_LOGGING"
  pool:
    max-size: 10
    min-idle: 5
    connection-timeout-ms: 30000



